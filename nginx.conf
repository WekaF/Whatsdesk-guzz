# Whatapps Reverse Proxy & Static Server Nginx Configuration
# Place this configuration in your /etc/nginx/sites-available/whatapps or nginx.conf

upstream backend_server {
    server 127.0.0.1:8000; # Address of the Go Fiber backend
    keepalive 32;
}

server {
    listen 8005;
    listen [::]:8005;
    server_name localhost; # Replace with your domain or IP in production

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Maximum upload size for Image and PDF attachments (crucial for Gateway uploads!)
    client_max_body_size 50M;

    # Gzip Compression for fast page loading
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_comp_level 5;

    # 1. Serve Frontend Static Assets (React Single Page App)
    location / {
        root /var/www/whatapps/frontend/dist; # Path to compiled frontend build directory
        index index.html;
        try_files $uri $uri/ /index.html; # fallback to index.html for react router client routing

        # Don't cache main HTML file to ensure browser always loads latest index.html referencing new asset hashes
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # 1.2 Cache aggressive for hashed static assets (Vite cache busting)
    location /assets/ {
        root /var/www/whatapps/frontend/dist;
        
        # Since Vite hashes built files (cache busting), we can cache them forever in the browser.
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # 2. Reverse Proxy Auth Endpoints to Go Backend
    location /auth/ {
        proxy_pass http://backend_server;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Reverse Proxy API Endpoints to Go Backend
    location /api/ {
        proxy_pass http://backend_server;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 4. Serve Media Uploads Statically (High Performance)
    # Serves the uploaded media directly from the backend uploads directory
    location /uploads/ {
        alias /var/www/whatapps/backend/uploads/; # Path to your backend uploads directory
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location /api/uploads/ {
        alias /var/www/whatapps/backend/uploads/; # Path to your backend uploads directory
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # 5. Reverse Proxy WebSockets (Realtime Device Connections)
    # Matches /devices/<uuid>/ws WebSocket endpoints
    location /devices/ {
        proxy_pass http://backend_server;
        proxy_http_version 1.1;

        # WebSocket headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable caching/buffering for WebSockets
        proxy_buffering off;
        proxy_read_timeout 86400s; # Keep websocket connection open for 24 hours without closing
        proxy_send_timeout 86400s;
    }
}
